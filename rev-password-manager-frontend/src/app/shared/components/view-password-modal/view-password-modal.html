<div class="overlay">
  <div class="modal">

    <h3>Verify Master Password</h3>

    <input
  type="password"
  [(ngModel)]="masterPassword"
  placeholder="Enter master password"
  (keyup.enter)="reveal()" />

    <div class="error" *ngIf="error">{{ error }}</div>

    <button class="btn-primary" (click)="reveal()" [disabled]="isLoading">
      {{ isLoading ? 'Verifying...' : 'Reveal Password' }}
    </button>

    <div *ngIf="revealedPassword !== null" class="revealed">
      {{ revealedPassword }}
    </div>

    <button class="btn-outline" (click)="closeModal()">
      Close
    </button>

  </div>
</div>
