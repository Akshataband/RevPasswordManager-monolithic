name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
          -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Backend Image
        run: |
          docker build \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/password-manager-backend:latest \
          ./RevPasswordManager/RevPasswordManager

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/password-manager-backend:latest

      - name: Build Frontend Image
        run: |
          docker build \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/password-manager-frontend:latest \
          ./RevPasswordManager_Frontend/rev-password-manager-frontend

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/password-manager-frontend:latest