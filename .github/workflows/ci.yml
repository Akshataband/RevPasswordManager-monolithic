name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Backend Image
        run: |
          cd RevPasswordManager/RevPasswordManager
          docker build -t ${{ secrets.DOCKER_USERNAME }}/password-manager-backend:latest .

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/password-manager-backend:latest

      - name: Build Frontend Image
        run: |
          cd RevPasswordManager_Frontend/rev-password-manager-frontend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/password-manager-frontend:latest .

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/password-manager-frontend:latest