version: "3.8"

services:

  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_DATABASE: passwordmanager
      MYSQL_USER: passworduser
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    image: ${DOCKERHUB_USERNAME}/password-manager-backend:${IMAGE_TAG}
    depends_on:
      db:
        condition: service_healthy
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/passwordmanager
      SPRING_DATASOURCE_USERNAME: passworduser
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "8080:8080"

  frontend:
    image: ${DOCKERHUB_USERNAME}/password-manager-frontend:${IMAGE_TAG}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  mysql-data: